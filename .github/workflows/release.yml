name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for GoReleaser to create the GitHub Release

jobs:
  goreleaser:
    runs-on: ubuntu-latest # pure-Go darwin binaries cross-compile fine here
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the changelog/version are accurate

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you enable the Homebrew tap in .goreleaser.yaml, also pass:
          # HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
